<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta property="og:type" content="website">

  <meta property="og:image:type" content="image/svg+xml">

  <meta property="og:image:height" content="630">
  <!-- Twitter Card (技術的メタタグ: シェア機能は実装しない) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Rainbow Trial - 7日間でFXシステムを体験">
  <meta name="twitter:description" content="本物のFXシステムを7日間体験。あなたの判定力が試されます🌈">

  <title>Rainbow Trial - Rainbow System を 7日間体験</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-title" content="Rainbow Trial">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon-180.png">

  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="assets/icons/splash/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="assets/icons/splash/splash-1668x2388.png" media="(device-width: 834px)  and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="assets/icons/splash/splash-1536x2048.png" media="(device-width: 768px)  and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="assets/icons/splash/splash-1125x2436.png" media="(device-width: 375px)  and (device-height: 812px)  and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="assets/icons/splash/splash-828x1792.png"  media="(device-width: 414px)  and (device-height: 896px)  and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="assets/icons/splash/splash-750x1334.png"  media="(device-width: 375px)  and (device-height: 667px)  and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/style.css?v=20260416-pwa">
  <link rel="stylesheet" href="css/components.css?v=20260416-pwa">
  <link rel="stylesheet" href="css/chart.css?v=20260416-pwa">
  <link rel="stylesheet" href="css/effects.css?v=20260416-p3">
  <link rel="stylesheet" href="css/phase4.css?v=20260416-p5">
  <link rel="stylesheet" href="css/finale.css?v=20260416-p5">

  <style>
    /* 画面切替(index 固有) */
    .screen { display: none; }
    .screen.is-active { display: block; animation: fadein .22s ease; overflow-x: hidden; }

    /* タブバー非表示時 */
    .tabbar.hidden { display: none; }

    /* 学習モーダルの本文スクロール */
    #overlay-learning .overlay__card {
      max-width: 560px;
      max-height: 86vh;
      display: flex;
      flex-direction: column;
    }
    #overlay-learning .overlay__body {
      overflow-y: auto;
      padding-right: var(--sp-2);
    }
    .overlay-learning__close {
      background: transparent;
      border: 0;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
    }
    .overlay-learning__close:hover { color: var(--text-primary); }
  </style>
</head>
<body>

  <!-- ==========================================================================
       固定ヘッダー
       ========================================================================== -->
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__logo" aria-label="Rainbow Trial">
        <img src="assets/logo.svg" alt="" width="132">
      </div>
      <div class="app-header__day" id="header-day">Day 1 / 7</div>
      <button class="app-header__settings" id="header-settings" type="button" aria-label="設定">⚙️</button>
    </div>
  </header>

  <!-- ==========================================================================
       プロモーションバー(通知許可 / ホーム画面追加)
       ========================================================================== -->
  <div class="promo-bar is-hidden" id="promo-notify" role="region" aria-label="通知を許可">
    <span class="promo-bar__text">🔔 シグナル通知を有効にしませんか?見逃し防止に役立ちます。</span>
    <span class="promo-bar__actions">
      <button class="promo-bar__btn" type="button" data-act="later">後で</button>
      <button class="promo-bar__btn promo-bar__btn--primary" type="button" data-act="allow">許可する</button>
    </span>
  </div>
  <div class="promo-bar is-hidden" id="promo-install" role="region" aria-label="ホーム画面に追加">
    <span class="promo-bar__text">📱 ホーム画面に追加して、アプリのように使えます</span>
    <span class="promo-bar__actions">
      <button class="promo-bar__btn" type="button" data-act="later">後で</button>
      <button class="promo-bar__btn promo-bar__btn--primary" type="button" data-act="install">追加</button>
    </span>
  </div>

  <!-- ==========================================================================
       通知バー(Level 1、notifications.js が動的挿入)
       ========================================================================== -->
  <div id="notice-bar" class="notice-bar" aria-live="polite"></div>

  <!-- ==========================================================================
       メイン: スクリーン切替
       ========================================================================== -->
  <main class="app">

    <!-- ----- Screen: メイン(タブ) ------------------------------------------ -->
    <section id="screen-main" class="screen is-active">
      <div class="app-main">
        <div class="panel is-active" data-panel="home"         id="panel-home"         aria-label="ホーム"></div>
        <div class="panel"           data-panel="signals"      id="panel-signals"      aria-label="シグナル一覧"></div>
        <div class="panel"           data-panel="history"      id="panel-history"      aria-label="トレード履歴"></div>
        <div class="panel"           data-panel="stats"        id="panel-stats"        aria-label="統計"></div>
        <div class="panel"           data-panel="achievements" id="panel-achievements" aria-label="実績"></div>
      </div>
    </section>

    <!-- ----- Screen: シグナル詳細 ------------------------------------------- -->
    <section id="screen-detail" class="screen" aria-label="シグナル詳細">
      <div class="app-main"></div>
    </section>

    <!-- ----- Screen: ポジション保有中 --------------------------------------- -->
    <section id="screen-position" class="screen" aria-label="ポジション保有中">
      <div class="app-main"></div>
    </section>

    <!-- ----- Screen: 結果 --------------------------------------------------- -->
    <section id="screen-result" class="screen" aria-label="結果"></section>

  </main>

  <!-- ==========================================================================
       タブバー(下部固定、メイン画面のみ表示)
       ========================================================================== -->
  <nav class="tabbar" id="tabbar" aria-label="メインナビゲーション">
    <div class="tabbar__inner">
      <button class="tabbar__btn is-active" data-tab="home" type="button">
        <span class="tabbar__icon" aria-hidden="true">🏠</span>
        <span>ホーム</span>
      </button>
      <button class="tabbar__btn" data-tab="signals" type="button">
        <span class="tabbar__icon" aria-hidden="true">📊</span>
        <span>シグナル</span>
      </button>
      <button class="tabbar__btn" data-tab="history" type="button">
        <span class="tabbar__icon" aria-hidden="true">📜</span>
        <span>履歴</span>
      </button>
      <button class="tabbar__btn" data-tab="stats" type="button">
        <span class="tabbar__icon" aria-hidden="true">📈</span>
        <span>統計</span>
      </button>
      <button class="tabbar__btn" data-tab="achievements" type="button">
        <span class="tabbar__icon" aria-hidden="true">🏆</span>
        <span>実績</span>
      </button>
    </div>
  </nav>

  <!-- ==========================================================================
       学習モーダル(overlay)
       ========================================================================== -->
  <div class="overlay" id="overlay-learning" role="dialog" aria-modal="true" aria-labelledby="learning-title">
    <div class="overlay__card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: var(--sp-4);">
        <h2 id="learning-title" style="font-size: 1.2rem;">🎓 Rainbow System の見方</h2>
        <button class="overlay-learning__close" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="overlay__body"></div>
    </div>
  </div>

  <!-- ==========================================================================
       設定モーダル(overlay)
       ========================================================================== -->
  <div class="overlay" id="overlay-settings" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="overlay__card overlay__card--settings">
      <div class="settings-head">
        <h2 id="settings-title">⚙️ 設定</h2>
        <button class="overlay-close" type="button" data-close="settings" aria-label="閉じる">×</button>
      </div>
      <div class="overlay__body" id="settings-body"></div>
    </div>
  </div>

  <!-- ==========================================================================
       デバッグメニュー(Konami Code で開く)
       ========================================================================== -->
  <div class="overlay" id="overlay-debug" role="dialog" aria-modal="true" aria-labelledby="debug-title">
    <div class="overlay__card">
      <div class="settings-head">
        <h2 id="debug-title">🔧 デバッグメニュー</h2>
        <button class="overlay-close" type="button" data-close="debug" aria-label="閉じる">×</button>
      </div>
      <div class="overlay__body" id="debug-body"></div>
    </div>
  </div>

  <!-- ==========================================================================
       アプリ本体: 依存関係順に読み込み
       ========================================================================== -->
  <!-- データ層 -->
  <script src="js/storage.js?v=20260416-p4"></script>
  <script src="data/scenarios.js?v=20260416-pwa"></script>

  <!-- Phase 3: データ定義 -->
  <script src="data/achievements-list.js?v=20260416-p3"></script>
  <script src="data/missions-list.js?v=20260416-p3"></script>

  <!-- Phase 4/5: データ定義 -->
  <script src="data/master-messages.js?v=20260416-p5"></script>
  <script src="data/members-feed.js?v=20260416-p5"></script>

  <!-- 状態・通知 -->
  <script src="js/game-state.js?v=20260416-pwa"></script>
  <script src="js/notifications.js?v=20260416-pwa"></script>

  <!-- ドメインロジック -->
  <script src="js/signals.js?v=20260416-pwa"></script>
  <script src="js/judgment.js?v=20260416-pwa"></script>
  <script src="js/chart.js?v=20260416-pwa"></script>
  <script src="js/trade.js?v=20260416-pwa"></script>

  <!-- Phase 3: コアシステム -->
  <script src="js/sound.js?v=20260416-p3"></script>
  <script src="js/effects.js?v=20260416-p3"></script>
  <script src="js/level-system.js?v=20260416-p3"></script>
  <script src="js/achievements.js?v=20260416-p3"></script>
  <script src="js/missions.js?v=20260416-p3"></script>
  <script src="js/judgment-score.js?v=20260416-p3"></script>
  <script src="js/stats.js?v=20260416-p3"></script>

  <!-- Phase 4/5: コアシステム -->
  <script src="js/master-message.js?v=20260416-p5"></script>
  <script src="js/members-feed.js?v=20260416-p5"></script>
  <script src="js/result-card.js?v=20260416-p5"></script>
  <script src="js/final-screen.js?v=20260416-p5"></script>

  <!-- 統合層 -->
  <script src="js/app.js?v=20260416-p5"></script>
  <script src="js/phase3-hooks.js?v=20260416-p3"></script>
  <script src="js/phase4-hooks.js?v=20260416-p5"></script>

</body>
</html>
