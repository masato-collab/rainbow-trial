<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F1419">
  <meta name="description" content="Rainbow System を、7日間体験。実際のサロンで配信されるトレードシグナルを疑似体験できるトレーニングアプリ。">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- OGP -->
  <meta property="og:title" content="Rainbow Trial — Rainbow System を、7日間体験。">
  <meta property="og:description" content="Rainbow System を疑似体験できる、7日間のトレーニングアプリ。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/og-image.svg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">

  <title>Rainbow Trial</title>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/style.css?v=20260416-day7">
  <link rel="stylesheet" href="css/components.css?v=20260416-day7">
  <link rel="stylesheet" href="css/chart.css?v=20260416-day7">

  <style>
    /* 画面切替(index 固有) */
    .screen { display: none; }
    .screen.is-active { display: block; animation: fadein .22s ease; }

    /* タブバー非表示時 */
    .tabbar.hidden { display: none; }

    /* 学習モーダルの本文スクロール */
    #overlay-learning .overlay__card {
      max-width: 560px;
      max-height: 86vh;
      display: flex;
      flex-direction: column;
    }
    #overlay-learning .overlay__body {
      overflow-y: auto;
      padding-right: var(--sp-2);
    }
    .overlay-learning__close {
      background: transparent;
      border: 0;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
    }
    .overlay-learning__close:hover { color: var(--text-primary); }
  </style>
</head>
<body>

  <!-- ==========================================================================
       固定ヘッダー
       ========================================================================== -->
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__logo" aria-label="Rainbow Trial">
        <img src="assets/logo.svg" alt="" width="132">
      </div>
      <div class="app-header__day" id="header-day">Day 1 / 7</div>
      <div class="app-header__capital mono" id="header-capital" role="button" tabindex="0" aria-label="現在の仮想資金">¥300,000</div>
    </div>
  </header>

  <!-- ==========================================================================
       通知バー(Level 1、notifications.js が動的挿入)
       ========================================================================== -->
  <div id="notice-bar" class="notice-bar" aria-live="polite"></div>

  <!-- ==========================================================================
       メイン: スクリーン切替
       ========================================================================== -->
  <main class="app">

    <!-- ----- Screen: メイン(タブ) ------------------------------------------ -->
    <section id="screen-main" class="screen is-active">
      <div class="app-main">
        <div class="panel is-active" data-panel="home" id="panel-home" aria-label="ホーム"></div>
        <div class="panel"           data-panel="signals" id="panel-signals" aria-label="シグナル一覧"></div>
        <div class="panel"           data-panel="history" id="panel-history" aria-label="トレード履歴"></div>
      </div>
    </section>

    <!-- ----- Screen: シグナル詳細 ------------------------------------------- -->
    <section id="screen-detail" class="screen" aria-label="シグナル詳細">
      <div class="app-main"></div>
    </section>

    <!-- ----- Screen: ポジション保有中 --------------------------------------- -->
    <section id="screen-position" class="screen" aria-label="ポジション保有中">
      <div class="app-main"></div>
    </section>

    <!-- ----- Screen: 結果 --------------------------------------------------- -->
    <section id="screen-result" class="screen" aria-label="結果"></section>

  </main>

  <!-- ==========================================================================
       タブバー(下部固定、メイン画面のみ表示)
       ========================================================================== -->
  <nav class="tabbar" id="tabbar" aria-label="メインナビゲーション">
    <div class="tabbar__inner">
      <button class="tabbar__btn is-active" data-tab="home" type="button">
        <span class="tabbar__icon" aria-hidden="true">🏠</span>
        <span>ホーム</span>
      </button>
      <button class="tabbar__btn" data-tab="signals" type="button">
        <span class="tabbar__icon" aria-hidden="true">📊</span>
        <span>シグナル</span>
      </button>
      <button class="tabbar__btn" data-tab="history" type="button">
        <span class="tabbar__icon" aria-hidden="true">📜</span>
        <span>履歴</span>
      </button>
    </div>
  </nav>

  <!-- ==========================================================================
       学習モーダル(overlay)
       ========================================================================== -->
  <div class="overlay" id="overlay-learning" role="dialog" aria-modal="true" aria-labelledby="learning-title">
    <div class="overlay__card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: var(--sp-4);">
        <h2 id="learning-title" style="font-size: 1.2rem;">🎓 Rainbow System の見方</h2>
        <button class="overlay-learning__close" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="overlay__body"></div>
    </div>
  </div>

  <!-- ==========================================================================
       アプリ本体: 依存関係順に読み込み
       ========================================================================== -->
  <!-- データ層 -->
  <script src="js/storage.js?v=20260416-day7"></script>
  <script src="data/scenarios.js?v=20260416-day7"></script>

  <!-- 状態・通知 -->
  <script src="js/game-state.js?v=20260416-day7"></script>
  <script src="js/notifications.js?v=20260416-day7"></script>

  <!-- ドメインロジック -->
  <script src="js/signals.js?v=20260416-day7"></script>
  <script src="js/judgment.js?v=20260416-day7"></script>
  <script src="js/chart.js?v=20260416-day7"></script>
  <script src="js/trade.js?v=20260416-day7"></script>

  <!-- 統合層 -->
  <script src="js/app.js?v=20260416-day7"></script>

</body>
</html>
