<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#9775FA">
  <title>オフライン | Rainbow Trial</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    :root {
      --bg-primary: #0F1419;
      --bg-elevated: #2A3142;
      --text-primary: #F5F7FA;
      --text-secondary: #A8B2C7;
      --text-muted: #6B7588;
      --rainbow: linear-gradient(135deg, #FF6B6B, #FFA94D, #FFD43B, #8CE99A, #4DABF7, #9775FA, #F783AC);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .wrap { max-width: 420px; width: 100%; }
    .icon {
      width: 96px; height: 96px;
      margin: 0 auto 24px;
      border-radius: 24px;
      background: var(--bg-elevated);
      display: grid; place-items: center;
      font-size: 2.4rem;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      font-weight: 800;
    }
    .rainbow-text {
      background: var(--rainbow);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p { color: var(--text-secondary); line-height: 1.7; margin: 0 0 24px; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: var(--rainbow);
      color: #0F1419;
      border: 0;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:active { transform: translateY(1px); }
    .note { margin-top: 20px; font-size: 0.84rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📡</div>
    <h1><span class="rainbow-text">オフラインです</span></h1>
    <p>
      インターネット接続を確認してください。<br>
      接続が戻るとアプリは通常どおり利用できます。
    </p>
    <button class="btn" type="button" onclick="location.reload()">再読み込み</button>
    <div class="note">インストール済みであれば、一度読み込んだページはオフラインでも動作します。</div>
  </div>
</body>
</html>
