<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="ha-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="60%" stop-color="#9775FA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="ha-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ha-rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"    stop-color="#FF0080"/>
      <stop offset="20%"   stop-color="#FF8C00"/>
      <stop offset="40%"   stop-color="#FFD700"/>
      <stop offset="60%"   stop-color="#00FF87"/>
      <stop offset="80%"   stop-color="#00BFFF"/>
      <stop offset="100%"  stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!-- 外枠レインボー -->
  <circle cx="60" cy="60" r="59" fill="url(#ha-rainbow)" opacity="0.9"/>
  <!-- 背景円 -->
  <circle cx="60" cy="60" r="56" fill="url(#ha-bg)"/>
  <circle cx="60" cy="60" r="56" fill="url(#ha-glow)"/>

  <!-- 体 (洋服) -->
  <ellipse cx="60" cy="98" rx="30" ry="20" fill="#6D28D9"/>
  <rect x="30" y="84" width="60" height="16" rx="0" fill="#6D28D9"/>

  <!-- 首 -->
  <rect x="53" y="73" width="14" height="12" rx="5" fill="#F9C5A0"/>

  <!-- 頭 -->
  <ellipse cx="60" cy="52" rx="23" ry="25" fill="#F9C5A0"/>

  <!-- 前髪・髪 -->
  <ellipse cx="60" cy="32" rx="25" ry="15" fill="#3B0764"/>
  <ellipse cx="38" cy="48" rx="11" ry="14" fill="#3B0764"/>
  <ellipse cx="82" cy="48" rx="11" ry="14" fill="#3B0764"/>
  <ellipse cx="60" cy="36" rx="22" ry="10" fill="#4C1D95"/>

  <!-- 耳 -->
  <ellipse cx="37" cy="55" rx="5" ry="6" fill="#F9C5A0"/>
  <ellipse cx="83" cy="55" rx="5" ry="6" fill="#F9C5A0"/>

  <!-- 目 -->
  <ellipse cx="51" cy="55" rx="4" ry="4.5" fill="#1E1B4B"/>
  <ellipse cx="69" cy="55" rx="4" ry="4.5" fill="#1E1B4B"/>
  <!-- 目ハイライト -->
  <circle cx="53" cy="53" r="1.5" fill="white"/>
  <circle cx="71" cy="53" r="1.5" fill="white"/>
  <!-- まつ毛 -->
  <line x1="47" y1="51" x2="49" y2="50" stroke="#1E1B4B" stroke-width="1.2"/>
  <line x1="51" y1="50" x2="51" y2="49" stroke="#1E1B4B" stroke-width="1.2"/>
  <line x1="55" y1="51" x2="57" y2="50" stroke="#1E1B4B" stroke-width="1.2"/>

  <!-- 眉 -->
  <path d="M47 49 Q51 47 55 49" stroke="#4C1D95" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M65 49 Q69 47 73 49" stroke="#4C1D95" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 頬 -->
  <ellipse cx="44" cy="62" rx="6" ry="3.5" fill="#FCA5A5" opacity="0.55"/>
  <ellipse cx="76" cy="62" rx="6" ry="3.5" fill="#FCA5A5" opacity="0.55"/>

  <!-- 口 -->
  <path d="M54 68 Q60 74 66 68" stroke="#DC7A7A" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- 髪飾り(虹色) -->
  <circle cx="80" cy="36" r="6" fill="url(#ha-rainbow)" opacity="0.95"/>
  <circle cx="80" cy="36" r="3.5" fill="#FFD700"/>
  <circle cx="80" cy="36" r="1.5" fill="white"/>
</svg>
